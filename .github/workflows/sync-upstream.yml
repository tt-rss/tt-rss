name: Sync from upstream tt-rss
'on':
  schedule:
  - cron: '0 */6 * * *'
  workflow_dispatch: null
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout this repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    - name: Fetch upstream
      run: 'git remote add upstream https://github.com/tt-rss/tt-rss.git 2>/dev/null || true

        git remote set-url origin https://github.com/ashcoft/tt-rss-non-dockerize.git 2>/dev/null || true

        git fetch upstream main --tags'
    - name: Reset to upstream
      run: 'git reset --hard upstream/main

        echo "Reset to upstream main"'
    - name: Remove Docker files
      run: |
        rm -rf .docker docker-compose.yml .env-dist .devcontainer
        rm -f .github/workflows/docker-code-quality.yml
        echo "Docker files removed"
    - name: Download workflow files from raw URL
      run: |
        mkdir -p .github/workflows
        
        # Download publish.yml (non-Docker version)
        curl -sL "https://raw.githubusercontent.com/ashcoft/tt-rss-non-dockerize/main/.github/workflows/publish.yml" \
          -o .github/workflows/publish.yml
        
        # Download shell-code-quality.yml (without Docker references)
        curl -sL "https://raw.githubusercontent.com/ashcoft/tt-rss-non-dockerize/main/.github/workflows/shell-code-quality.yml" \
          -o .github/workflows/shell-code-quality.yml
        
        echo "Workflow files downloaded"
    - name: Add feedly theme
      run: |
        FEEDLY_DIR="themes/feedly"
        mkdir -p "$FEEDLY_DIR"
        curl -sL https://api.github.com/repos/ashcoft/tt-rss-feedly-theme/tarball/dist | tar -xz -C /tmp/
        FEEDLY_SRC=$(tar -tzf /tmp/*.tar.gz 2>/dev/null | head -1 | cut -d/ -f1 | head -c 100)
        if [ -n "$FEEDLY_SRC" ] && [ -d "/tmp/$FEEDLY_SRC" ]; then
          cp -rn "/tmp/$FEEDLY_SRC/"* "$FEEDLY_DIR/" 2>/dev/null || true
          echo "Added feedly theme from dist branch"
        else
          echo "Warning: feedly theme download failed"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Commit and push
      run: |
        git add -A
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Sync: nondockerize + feedly theme as default"
          git push origin main
          echo "Pushed to origin main"
        fi

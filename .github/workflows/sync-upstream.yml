name: Sync from upstream tt-rss
'on':
  schedule:
  - cron: 0 */6 * * *
  workflow_dispatch: null
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout this repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Configure git
      run: 'git config user.name "github-actions[bot]"

        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"'
    - name: Fetch upstream
      run: 'git remote add upstream https://github.com/tt-rss/tt-rss.git 2>/dev/null || true

        git remote set-url origin https://github.com/ashcoft/tt-rss-non-dockerize.git 2>/dev/null || true

        git fetch upstream main --tags'
    - name: Reset to upstream
      run: 'git reset --hard upstream/main

        echo "Reset to upstream main"'
    - name: Remove Docker files
      run: 'rm -rf .docker docker-compose.yml .env-dist .devcontainer

        rm -f .github/workflows/docker-code-quality.yml

        echo "Docker files removed"'
    - name: Write workflow files
      run: "python3 -c \"\nimport base64, os\nos.makedirs(\".github/workflows\", exist_ok=True)\nwith open(\".github/workflows/publish.yml\", \"wb\") as f:\n    f.write(base64.b64decode(\"\"))\nprint(\"Created publish.yml\")\nwith open(\".github/workflows/shell-code-quality.yml\", \"wb\") as f:\n    f.write(base64.b64decode(\"\"))\nprint(\"Created shell-code-quality.yml\")\n\""
    - name: Add feedly theme
      run: |
        FEEDLY_DIR="themes/feedly"
        mkdir -p "$FEEDLY_DIR"
        curl -sL https://api.github.com/repos/ashcoft/tt-rss-feedly-theme/tarball/dist | tar -xz -C /tmp/
        FEEDLY_SRC=$(tar -tzf /tmp/*.tar.gz 2>/dev/null | head -1 | cut -d/ -f1 | head -c 100)
        if [ -n "$FEEDLY_SRC" ] && [ -d "/tmp/$FEEDLY_SRC" ]; then
          cp -rn "/tmp/$FEEDLY_SRC/"* "$FEEDLY_DIR/" 2>/dev/null || true
          echo "Added feedly theme from dist branch"
        else
          echo "Warning: feedly theme download failed"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Commit and push
      run: "git add -A\nif git diff --staged --quiet; then\n  echo \"No changes to commit\"\nelse\n  git commit -m \"Sync: nondockerize + feedly theme as default\"\n  git push origin main\n  echo \"Pushed to origin main\"\nfi"

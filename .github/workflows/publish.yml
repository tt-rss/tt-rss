name: Sync & Publish Versions

on:
  push:
    branches: [main]
    paths-ignore:
    - '.devcontainer/**'
    - '.vscode/**'
    - 'tests/**'
    - 'tests_functional/**'
    - 'tests_integration/**'
    - '*.md'
    - '*.neon'
    - '*.xml'
    - 'phpstan.neon'
    - '.changeset/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  css-lint:
    uses: ./.github/workflows/css-lint.yml

  javascript-code-quality:
    uses: ./.github/workflows/javascript-code-quality.yml

  php-code-quality:
    uses: ./.github/workflows/php-code-quality.yml

  shell-code-quality:
    uses: ./.github/workflows/shell-code-quality.yml

  validate-sql:
    needs: [css-lint, javascript-code-quality, php-code-quality, shell-code-quality]
    uses: ./.github/workflows/validate-sql.yml

  publish-version:
    needs: [validate-sql]
    uses: ./.github/workflows/publish-version-json.yml
    permissions:
      contents: write

  release-ready:
    name: Release Ready
    needs: [validate-sql, publish-version]
    runs-on: ubuntu-latest
    steps:
      - name: Check for changeset files
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Check changesets
        id: changeset_check
        run: |
          if ls .changeset/*.md 2>/dev/null | head -1 | grep -q .; then
            echo "Changesets found! The release workflow will create a release."
            echo "has_changesets=true" >> $GITHUB_OUTPUT
          else
            echo "No changeset files found. Add files to .changeset/ to create a release."
            echo "has_changesets=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## Quality Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CSS Lint | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| JavaScript Code Quality | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| PHP Code Quality | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Shell Code Quality | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL Validation | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Version JSON | Published |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Creating Releases with Changesets" >> $GITHUB_STEP_SUMMARY
          echo "To create a release, add a changeset file to the .changeset/ directory:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Example:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo 'echo "---" > .changeset/my-change.md' >> $GITHUB_STEP_SUMMARY
          echo 'echo "tt-rss-non-dockerize: patch" >> .changeset/my-change.md' >> $GITHUB_STEP_SUMMARY
          echo 'echo "" >> .changeset/my-change.md' >> $GITHUB_STEP_SUMMARY
          echo 'echo "Your change description here" >> .changeset/my-change.md' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bump types:** major, minor, patch" >> $GITHUB_STEP_SUMMARY

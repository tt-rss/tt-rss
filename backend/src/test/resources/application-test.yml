spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:15:///ttrss_test
    username: test
    password: test
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ttrss.module.**.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
    com.ttrss: DEBUG
    org.springframework.jdbc: DEBUG

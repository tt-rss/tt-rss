#
# Docker Compose 生产环境配置
# 用于 tt-rss 生产部署，包含 PostgreSQL、后端 Spring Boot、前端 Nginx、调度器
#
# 使用方法:
#   1. cp .env.example .env
#   2. 修改 .env 中的 JWT_SECRET 为安全密钥
#   3. docker compose -f docker-compose.prod.yml up -d
#   4. 访问 http://localhost (前端)
#

version: '3.8'

services:
  # ===========================================
  # PostgreSQL 数据库（生产环境）
  # ===========================================
  db:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    container_name: ttrss-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ttrss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ttrss}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ttrss_user} -d ${POSTGRES_DB:-ttrss}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ttrss-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ===========================================
  # 后端 Spring Boot 服务（生产环境）
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ttrss-backend
    restart: always
    environment:
      # Spring 配置
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080

      # 数据库连接
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ttrss}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ttrss_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      # JPA/Hibernate 配置
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"

      # JWT 配置（必须修改为安全密钥）
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-900000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}

      # Actuator
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info

      # 日志配置
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
      LOGGING_LEVEL_COM_TTRSS: ${LOGGING_LEVEL_COM_TTRSS:-INFO}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ttrss-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  # ===========================================
  # 前端 Nginx 服务（生产环境）
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    container_name: ttrss-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ttrss-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ===========================================
  # 定时任务服务（Feed 自动更新）
  # ===========================================
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ttrss-scheduler
    restart: always
    environment:
      # Spring 配置
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # 数据库连接
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ttrss}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ttrss_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      # JWT 配置（需要与后端一致）
      JWT_SECRET: ${JWT_SECRET}

      # 调度器配置
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_FIXED_DELAY: ${SCHEDULER_FIXED_DELAY:-300000}
      SCHEDULER_INITIAL_DELAY: ${SCHEDULER_INITIAL_DELAY:-60000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ttrss-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  ttrss-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
    name: ttrss_postgres_data
